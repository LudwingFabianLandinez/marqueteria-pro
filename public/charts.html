<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gráfico de Ventas - Marquetería</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body{font-family:Inter,Segoe UI,sans-serif;background:#f1f5f9;color:#1e293b;padding:18px}
    .card{background:#fff;padding:18px;border-radius:12px;border:1px solid #e6eef8}
    .actions{display:flex;gap:10px;align-items:center;margin-bottom:12px}
    .btn{padding:10px 14px;border-radius:10px;border:none;cursor:pointer;font-weight:700}
    .btn-primary{background:#4f46e5;color:#fff}
    .btn-ghost{background:#f1f5f9;color:#334155}
    .muted{color:#64748b;font-size:0.95rem}
  </style>
</head>
<body>
  <div style="width:100%;max-width:100%;margin:0; padding:18px 24px; box-sizing:border-box;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <h2 style="margin:0;color:#1e3a8a;font-size:2rem">Ventas — Gráfico</h2>
      <div class="muted" id="rangeLabel" style="font-size:1.25rem;font-weight:800;color:#334155">Cargando rango...</div>
    </div>

    <div class="card">
      <div class="actions" style="padding:12px 6px;margin-bottom:8px">
        <div style="display:flex;gap:8px;align-items:center">
          <button id="btnViewByDate" class="btn btn-ghost">Por fecha</button>
        </div>
        <div style="margin-left:auto;display:flex;gap:10px;align-items:center">
          <button id="btnExportPNG" class="btn btn-primary">Exportar PNG</button>
          <button id="btnExportCSV" class="btn btn-ghost">Exportar CSV</button>
          <button id="btnBack" class="btn" style="background:#eef2ff;color:#1e3a8a;font-weight:800;border:1px solid #c7d2fe;padding:10px 14px;border-radius:10px;">Volver</button>
        </div>
      </div>
      <div style="width:100%;">
        <canvas id="ordersChart" style="width:100%;height:60vh;display:block"></canvas>
      </div>
    </div>
  </div>

  <script src="js/prepareChartData.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
  (async function(){
    function getParam(name){ const u = new URLSearchParams(location.search); return u.get(name) || '' }
    const desdeParam = getParam('desde');
    const hastaParam = getParam('hasta');
    const clienteParam = getParam('cliente');
    const rangeLabel = document.getElementById('rangeLabel');
    rangeLabel.textContent = (desdeParam || hastaParam) ? `Rango: ${desdeParam||'--'} → ${hastaParam||'--'}` : 'Rango: Todas las OT';
    if (clienteParam) rangeLabel.textContent += ` — Cliente: ${clienteParam}`;

    // Fetch invoices (use same base resolution as history.js)
    let invoices = [];
    let fetchError = false;
    try{
      const base = (typeof window.resolveApiBase === 'function')
        ? window.resolveApiBase()
        : ((['localhost','127.0.0.1'].includes(window.location.hostname) || window.location.protocol === 'file:')
            ? 'https://marqueterialachica.netlify.app/.netlify/functions/server'
            : `${window.location.origin}/.netlify/functions/server`);
      const res = await fetch(base + '/invoices');
      if (!res.ok) { console.warn('Fetch invoices status', res.status); fetchError = true; }
      invoices = await res.json();
    }catch(e){ console.error('No se pudieron cargar facturas', e); invoices = []; fetchError = true; }

    // Apply date filters from query params (if any)
    try{
      let desde = desdeParam ? new Date(desdeParam) : null;
      let hasta = hastaParam ? new Date(hastaParam) : null;
      if (desde) { desde.setHours(0,0,0,0); }
      if (hasta) { hasta.setHours(23,59,59,999); }
      if (desde || hasta) {
        invoices = invoices.filter(inv => {
          const raw = inv.fecha || inv.date || inv.createdAt;
          const d = raw ? new Date(raw) : null;
          if (!d || isNaN(d)) return false;
          if (desde && d < desde) return false;
          if (hasta && d > hasta) return false;
          return true;
        });
      }
    }catch(e){ console.warn('Error aplicando filtros en charts.html', e); }

    const noDataEl = document.createElement('div');
    noDataEl.style.padding = '18px';
    noDataEl.style.color = '#475569';
    noDataEl.style.fontWeight = '600';
    if (fetchError || !invoices || invoices.length === 0) {
      noDataEl.textContent = fetchError ? 'No fue posible cargar las órdenes. Revisa la consola.' : 'No hay órdenes para el rango seleccionado.';
      document.querySelector('.card').appendChild(noDataEl);
      // hide export buttons
      document.getElementById('btnExportPNG').style.display = 'none';
      document.getElementById('btnExportCSV').style.display = 'none';
    } else {
      // If cliente param is present, filter invoices by cliente.nombre (case-insensitive substring)
      if (clienteParam) {
        const q = clienteParam.trim().toLowerCase();
        invoices = invoices.filter(f => {
          const name = (f.cliente && f.cliente.nombre) ? String(f.cliente.nombre) : (f.cliente || f.nombre || '');
          return String(name).toLowerCase().includes(q);
        });
      }

      // Helper to parse numeric strings
      function parseNumberValueSimple(v){
        if (v == null) return 0;
        if (typeof v === 'number') return v;
        let s = String(v).trim();
        s = s.replace(/[^0-9.,-]/g, '');
        if (!s) return 0;
        if (s.indexOf('.') !== -1 && s.indexOf(',') !== -1) { s = s.replace(/\./g, '').replace(/,/g, '.'); }
        else if (s.indexOf('.') !== -1 && s.indexOf(',') === -1) { s = s.replace(/\./g, ''); }
        else if (s.indexOf(',') !== -1 && s.indexOf('.') === -1) { s = s.replace(/,/g, '.'); }
        const n = Number(s);
        return isNaN(n) ? 0 : n;
      }

      // Group by date (YYYY-MM-DD) and sum totalFactura and saldoPendiente per day
      const sumsByDate = {};
      invoices.forEach(f => {
        const raw = f.fecha || f.date || f.createdAt;
        const d = raw ? new Date(raw) : null;
        if (!d || isNaN(d)) return;
        const key = d.toISOString().slice(0,10);
        const totalVal = parseNumberValueSimple(f.totalFactura || f.total || f.totalVenta || 0);
        const pagadoVal = parseNumberValueSimple(f.totalPagado || f.total_pagado || f.abono || f.totalPagado || 0);
        const saldoField = (f.saldoPendiente !== undefined) ? f.saldoPendiente : (f.saldo || f.saldo_pendiente || null);
        const saldoFieldVal = (saldoField != null) ? parseNumberValueSimple(saldoField) : null;

        let saldoVal = 0;
        // Prefer explicit totalPagado when present
        if (pagadoVal && pagadoVal > 0) {
          saldoVal = Math.max(0, totalVal - pagadoVal);
        } else if (saldoFieldVal !== null && !isNaN(saldoFieldVal) && saldoFieldVal <= totalVal) {
          // Use provided saldo if it looks valid
          saldoVal = saldoFieldVal;
        } else {
          // Fallback: assume not paid
          saldoVal = totalVal - pagadoVal;
        }
        if (!sumsByDate[key]) sumsByDate[key] = { ventas: 0, pendiente: 0 };
        sumsByDate[key].ventas += totalVal;
        sumsByDate[key].pendiente += saldoVal;
      });

      const sortedDates = Object.keys(sumsByDate).sort();
      if (sortedDates.length === 0) {
        noDataEl.textContent = 'No hay datos para el cliente/rango seleccionado.';
        document.querySelector('.card').appendChild(noDataEl);
        document.getElementById('btnExportPNG').style.display = 'none';
        document.getElementById('btnExportCSV').style.display = 'none';
        return;
      }

      const labels = sortedDates.map(d => d);
      const ventasData = sortedDates.map(d => Math.round(sumsByDate[d].ventas || 0));
      const pendienteData = sortedDates.map(d => Math.round(sumsByDate[d].pendiente || 0));

      // Prepare per-day chart data (kept for completeness)
      const chartDataDay = {
        labels,
        datasets: [
          { label: 'Ventas', data: ventasData, backgroundColor: '#16a34a', borderColor: '#16a34a' },
          { label: 'Pendiente', data: pendienteData, backgroundColor: '#dc2626', borderColor: '#dc2626' }
        ]
      };

      // Also prepare per-month aggregation (YYYY-MM)
      const sumsByMonth = {};
      Object.keys(sumsByDate).forEach(dayKey => {
        const monthKey = dayKey.slice(0,7); // YYYY-MM
        if (!sumsByMonth[monthKey]) sumsByMonth[monthKey] = { ventas:0, pendiente:0 };
        sumsByMonth[monthKey].ventas += sumsByDate[dayKey].ventas || 0;
        sumsByMonth[monthKey].pendiente += sumsByDate[dayKey].pendiente || 0;
      });

      const monthKeys = Object.keys(sumsByMonth).sort();
      const monthLabels = monthKeys.map(m => {
        try {
          const d = new Date(m + '-01');
          let fmt = new Intl.DateTimeFormat('es-CO', { month: 'short', year: 'numeric' }).format(d);
          fmt = fmt.replace('.', '');
          return fmt.charAt(0).toUpperCase() + fmt.slice(1);
        } catch (e) {
          return m;
        }
      });
      const ventasMonth = monthKeys.map(m => Math.round(sumsByMonth[m].ventas || 0));
      const pendienteMonth = monthKeys.map(m => Math.round(sumsByMonth[m].pendiente || 0));

      const chartDataMonth = {
        labels: monthLabels,
        datasets: [
          { label: 'Ventas', data: ventasMonth, backgroundColor: '#16a34a', borderColor: '#16a34a' },
          { label: 'Pendiente', data: pendienteMonth, backgroundColor: '#dc2626', borderColor: '#dc2626' }
        ]
      };

      const formatCurrency = (v) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(v);
      const canvas = document.getElementById('ordersChart');
      const ctx = canvas.getContext('2d');
      let chartInstance = null;

      // Plugin: draw value labels above bars
      const valueLabelPlugin = {
        id: 'valueLabelPlugin',
        afterDatasetsDraw(chart) {
          const { ctx } = chart;
          ctx.save();
          chart.data.datasets.forEach((dataset, datasetIndex) => {
            const meta = chart.getDatasetMeta(datasetIndex);
            meta.data.forEach((element, index) => {
              const value = dataset.data[index];
              if (value == null) return;
              const label = formatCurrency(value);
              const position = element.tooltipPosition();
              ctx.fillStyle = '#0f172a';
              ctx.font = '700 12px Inter, Roboto, sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText(label, position.x, position.y - 10);
            });
          });
          ctx.restore();
        }
      };

      // aggregated sumsByDate is already computed above
      function renderAggregated(){
        const totalSum = Object.values(sumsByDate).reduce((acc, v) => acc + (v.ventas||0), 0);
        const saldoSum = Object.values(sumsByDate).reduce((acc, v) => acc + (v.pendiente||0), 0);
        const data = { labels: ['Ventas','Pendiente'], datasets: [{ data: [Math.round(totalSum), Math.round(saldoSum)], backgroundColor: ['#16a34a', '#dc2626'] }] };
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
          type: 'bar',
          data,
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { labels: { font: { size: 12 } } },
              tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label || ''}: ${formatCurrency(ctx.parsed.y)}` } }
            },
            scales: {
              y: { beginAtZero: true, ticks: { callback: v => formatCurrency(v), font: { size: 12 } } }
            },
            layout: { padding: { top: 10, bottom: 8 } }
          },
          plugins: [valueLabelPlugin]
        });
      }

      function renderByDate(){
          // Render by MONTH (user requested grouping by month instead of day)
          const data = chartDataMonth;
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
          type: 'bar',
          data,
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { labels: { font: { size: 12 } } },
              tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${formatCurrency(ctx.parsed.y)}` } }
            },
            scales: {
              x: { stacked: false, ticks: { maxRotation: 35, minRotation: 10, font: { size: 11 } } },
              y: { beginAtZero: true, ticks: { callback: v => formatCurrency(v), font: { size: 12 } } }
            },
            layout: { padding: { top: 10, bottom: 8 } }
          },
          plugins: [valueLabelPlugin]
        });
      }

      // initial render: if multiple dates show by-date, otherwise aggregated
      if (labels.length > 1) renderByDate(); else renderAggregated();

      // View toggle handlers
      document.getElementById('btnViewByDate').addEventListener('click', function(){ renderByDate(); });

      document.getElementById('btnExportPNG').addEventListener('click', function(){
        try{ const url = chartInstance.toBase64Image(); const a = document.createElement('a'); a.href = url; a.download = 'ventas_grafico.png'; document.body.appendChild(a); a.click(); a.remove(); }
        catch(e){ console.error(e); alert('Error exportando PNG') }
      });

      document.getElementById('btnExportCSV').addEventListener('click', function(){
        try{
          const isAgg = chartInstance.data && chartInstance.data.labels && chartInstance.data.labels.length === 2 && chartInstance.data.labels[0] === 'Ventas';
          let csv = '';
          if (isAgg) {
            const v = chartInstance.data.datasets[0].data[0] || 0;
            const s = chartInstance.data.datasets[0].data[1] || 0;
            csv = `Metric;Value\nTotal Venta;${Math.round(v)}\nSaldo Pendiente;${Math.round(s)}\n`;
          } else {
            csv = `Fecha;Ventas;Pendiente\n`;
            const labs = chartInstance.data.labels || [];
            const dsVentas = chartInstance.data.datasets.find(d => d.label === 'Ventas') || chartInstance.data.datasets[0];
            const dsPend = chartInstance.data.datasets.find(d => d.label === 'Pendiente') || chartInstance.data.datasets[1];
            labs.forEach((lab,i)=>{
              const vv = dsVentas.data[i]||0; const ss = dsPend.data[i]||0;
              csv += `${lab};${Math.round(vv)};${Math.round(ss)}\n`;
            });
          }
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = 'ventas_export.csv'; document.body.appendChild(a); a.click(); a.remove();
          URL.revokeObjectURL(url);
        }catch(e){ console.error(e); alert('Error exportando CSV') }
      });
      // Back button: if opened from history page, close this tab and focus opener; otherwise navigate to history.html
      const backBtn = document.getElementById('btnBack');
      if (backBtn) {
        backBtn.addEventListener('click', function(){
          try {
            if (window.opener && !window.opener.closed) {
              window.opener.focus();
              // Close the current window (allowed because it was opened via script)
              window.close();
              return;
            }
          } catch (e) {
            console.warn('No opener available or error focusing opener', e);
          }
          // Fallback: navigate back to history page
          window.location.href = 'history.html';
        });
      }
    }
  })();
  </script>
</body>
</html>
